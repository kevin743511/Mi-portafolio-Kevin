<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS.ARCANA - Portafolio UPLA</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loader"><span>SINCRONIZANDO NEXO...</span></div>
    <canvas id="canvas-particles"></canvas>

    <div id="auth-section" class="container">
        <h1 class="glitch">OS.ARCANA</h1>
        <div class="auth-box">
            <div id="reg-fields" class="d-none">
                <input type="text" id="full-name" placeholder="NOMBRE COMPLETO">
                <select id="reg-role">
                    <option value="ESTUDIANTE">ESTUDIANTE</option>
                    <option value="ADMIN">ADMINISTRADOR</option>
                </select>
            </div>
            <input type="text" id="user" placeholder="USUARIO">
            <input type="password" id="pass" placeholder="CONTRASEÑA">
            <button id="main-btn" onclick="ejecutarAccion()">INICIAR NÚCLEO</button>
            <p onclick="toggleAuth()" class="pointer mt-3 opacity-50" style="font-size:10px">INTERCAMBIAR PROTOCOLO (LOGIN/REGISTRO)</p>
        </div>
    </div>

    <div id="portfolio-section" class="container d-none">
        <nav>
            <div class="user-info">
                <span id="nav-username">SISTEMA</span>
                <small id="nav-role">CARGANDO...</small>
            </div>
            <button class="logout-btn" onclick="logout()"><i class="fa fa-power-off"></i></button>
        </nav>

        <div class="grid-modules">
            <div class="module-card" id="card-1" onclick="abrirPortal(1)">
                <div class="orb"><span>MOD_1</span></div>
                <h3>I</h3>
                <p id="cnt-1">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-1" class="fill"></div></div>
                <div id="inv-1" class="internal-interface d-none">
                    <div class="weeks-nav">
                        <button class="w-pill w-btn-1-1 active" onclick="event.stopPropagation(); setWeek(1, 1)">W1</button>
                        <button class="w-pill w-btn-1-2" onclick="event.stopPropagation(); setWeek(1, 2)">W2</button>
                        <button class="w-pill w-btn-1-3" onclick="event.stopPropagation(); setWeek(1, 3)">W3</button>
                        <button class="w-pill w-btn-1-4" onclick="event.stopPropagation(); setWeek(1, 4)">W4</button>
                    </div>
                    <div id="admin-zone-1" class="admin-zone d-none">
                        <input type="file" id="file-1" class="d-none" onchange="inyectarDato(1)">
                        <button onclick="event.stopPropagation(); document.getElementById('file-1').click()" class="btn-inject">+ INYECTAR</button>
                    </div>
                    <div id="list-1" class="file-list"></div>
                </div>
            </div>

            <div class="module-card" id="card-2" onclick="abrirPortal(2)">
                <div class="orb" style="border-color:#a0f"><span>MOD_2</span></div>
                <h3>II</h3>
                <p id="cnt-2">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-2" class="fill"></div></div>
                <div id="inv-2" class="internal-interface d-none">
                    <div class="weeks-nav">
                        <button class="w-pill w-btn-2-1 active" onclick="event.stopPropagation(); setWeek(2, 1)">W1</button>
                        <button class="w-pill w-btn-2-2" onclick="event.stopPropagation(); setWeek(2, 2)">W2</button>
                    </div>
                    <div id="admin-zone-2" class="admin-zone d-none">
                        <input type="file" id="file-2" class="d-none" onchange="inyectarDato(2)">
                        <button onclick="event.stopPropagation(); document.getElementById('file-2').click()" class="btn-inject">+ INYECTAR</button>
                    </div>
                    <div id="list-2" class="file-list"></div>
                </div>
            </div>
            
            </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
