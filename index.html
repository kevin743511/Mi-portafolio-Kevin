<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KVN-ARCANA | SUPREMO V2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="canvas-particles"></canvas>

    <div id="loader" class="arcana-loader">
        <div class="loader-circle"></div>
        <div class="loader-text">SINCRONIZANDO NÚCLEOS...</div>
    </div>

    <div id="auth-section" class="nexus-wrapper">
        <div class="arcana-terminal">
            <h1 class="arcana-glitch" data-text="KVN.EXE">KVN.EXE</h1>
            <div class="form-container">
                <div class="arcana-field mt-4">
                    <input type="text" id="user" required>
                    <label>ID_OPERADOR</label>
                </div>
                <div class="arcana-field mt-4">
                    <input type="password" id="pass" required>
                    <label>RUNA_DE_ACCESO</label>
                </div>
                <div id="reg-fields" class="d-none">
                    <div class="arcana-field mt-4">
                        <input type="text" id="full-name">
                        <label>NOMBRE_REAL</label>
                    </div>
                    <div class="arcana-field mt-4">
                        <select id="reg-role">
                            <option value="VISITANTE">VISUALIZADOR</option>
                            <option value="ADMIN">ADMINISTRADOR</option>
                        </select>
                    </div>
                </div>
                <button onclick="ejecutarAccion()" id="main-btn" class="btn-arcana mt-5">IGNICIAR NÚCLEO</button>
                <button onclick="toggleAuth()" id="btn-toggle" class="btn-link-void mt-3">Crear nueva identidad</button>
            </div>
        </div>
    </div>

    <div id="portfolio-section" class="d-none">
        <nav class="arcana-nav">
            <div class="nav-left">KVN<span class="v-line">|</span>OS.ARCANA</div>
            <div class="nav-right">
                <span id="nav-role" class="arcana-badge"></span>
                <span id="nav-username"></span>
                <button onclick="logout()" class="btn-disconnect"><i class="fa fa-power-off"></i></button>
            </div>
        </nav>

        <div class="container-fluid px-4 py-5">
            <div class="row g-4" id="portal-container">
                <script>
                    const mods = [
                        {id: 1, n: "SISTEMAS_COMPLEJOS", c: "blue"},
                        {id: 2, n: "BASE_DE_DATOS", c: "purple"},
                        {id: 3, n: "ALGORITMOS", c: "cyan"},
                        {id: 4, n: "RESPONSABILIDAD_SOC", c: "red"}
                    ];
                    mods.forEach(m => {
                        document.write(`
                        <div class="col-xl-3 col-md-6">
                            <div class="void-portal-card" id="card-${m.id}">
                                <div class="portal-core core-${m.c}" onclick="abrirPortal(${m.id})">
                                    <div class="portal-ring ring-1"></div>
                                    <div class="portal-ring ring-2"></div>
                                    <div class="portal-energy"></div>
                                    <div class="portal-particles"></div>
                                    <div class="portal-label">MOD_${m.id}</div>
                                </div>
                                <div class="portal-content">
                                    <h3>${m.n}</h3>
                                    <div class="progress-arcana"><div class="p-bar" id="pb-${m.id}"></div></div>
                                    <p id="cnt-${m.id}" class="small mt-2">0 RUNAS</p>
                                    
                                    <div class="internal-interface d-none" id="inv-${m.id}">
                                        <div class="week-pill-container" id="weeks-${m.id}">
                                            ${[1,2,3,4].map(w => `<button onclick="setWeek(${m.id},${w})" class="w-pill w-pill-${m.id} w-btn-${m.id}-${w} ${w==1?'active':''}">W${w}</button>`).join('')}
                                        </div>
                                        <div id="admin-zone-${m.id}" class="d-none mt-3">
                                            <input type="file" id="file-${m.id}" class="d-none" onchange="inyectarDato(${m.id})">
                                            <label for="file-${m.id}" class="btn-upload"><i class="fa fa-plus"></i> INYECTAR</label>
                                        </div>
                                        <div class="arcana-list mt-2" id="list-${m.id}"></div>
                                    </div>
                                </div>
                            </div>
                        </div>`);
                    });
                </script>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
