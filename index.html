<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OS.ARCANA - Portafolio Cinemático</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="loader"><span>INICIALIZANDO NÚCLEO...</span></div>
    <canvas id="canvas-particles"></canvas>

    <div id="auth-section" class="container">
        <h1 class="glitch" data-text="OS.ARCANA">OS.ARCANA</h1>
        <div class="auth-box">
            <div id="reg-fields" class="d-none">
                <input type="text" id="full-name" placeholder="NOMBRE COMPLETO">
                <select id="reg-role">
                    <option value="ESTUDIANTE">ESTUDIANTE</option>
                    <option value="ADMIN">ADMINISTRADOR</option>
                </select>
            </div>
            <div class="input-group">
                <input type="text" id="user" placeholder="ID DE USUARIO">
                <input type="password" id="pass" placeholder="CONTRASEÑA">
            </div>
            <button id="main-btn" onclick="ejecutarAccion()">INICIAR NÚCLEO</button>
            <p onclick="toggleAuth()" class="auth-toggle">INTERCAMBIAR PROTOCOLO (LOGIN/REGISTRO)</p>
        </div>
    </div>

    <div id="portfolio-section" class="container d-none">
        <nav class="glass-nav">
            <div class="user-profile">
                <div class="avatar"></div>
                <div class="info">
                    <span id="nav-username">USUARIO</span>
                    <small id="nav-role">SISTEMA</small>
                </div>
            </div>
            <button class="btn-logout" onclick="logout()"><i class="fa fa-power-off"></i></button>
        </nav>

        <div class="grid-modules">
            <div class="module-card" id="card-1" onclick="abrirPortal(1)">
                <div class="orb"><span>MOD_1</span></div>
                <h3>UNIDAD I</h3>
                <p id="cnt-1">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-1" class="fill"></div></div>
            </div>
            <div class="module-card" id="card-2" onclick="abrirPortal(2)">
                <div class="orb orb-purple"><span>MOD_2</span></div>
                <h3>UNIDAD II</h3>
                <p id="cnt-2">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-2" class="fill"></div></div>
            </div>
            <div class="module-card" id="card-3" onclick="abrirPortal(3)">
                <div class="orb orb-green"><span>MOD_3</span></div>
                <h3>UNIDAD III</h3>
                <p id="cnt-3">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-3" class="fill"></div></div>
            </div>
            <div class="module-card" id="card-4" onclick="abrirPortal(4)">
                <div class="orb orb-red"><span>MOD_4</span></div>
                <h3>UNIDAD IV</h3>
                <p id="cnt-4">0 FRAGMENTOS</p>
                <div class="progress-bar"><div id="pb-4" class="fill"></div></div>
            </div>
        </div>

        <div id="portal-overlay" class="portal-overlay d-none">
            <div class="portal-content">
                <div class="portal-header">
                    <h2 id="portal-title">UNIDAD N</h2>
                    <button onclick="cerrarPortal()" class="btn-close">&times;</button>
                </div>
                
                <div class="weeks-bar">
                    <button class="w-btn active" id="w1-btn" onclick="setWeek(1)">W1</button>
                    <button class="w-btn" id="w2-btn" onclick="setWeek(2)">W2</button>
                    <button class="w-btn" id="w3-btn" onclick="setWeek(3)">W3</button>
                    <button class="w-btn" id="w4-btn" onclick="setWeek(4)">W4</button>
                </div>

                <div id="admin-controls" class="admin-zone d-none">
                    <input type="file" id="file-input" class="d-none" onchange="inyectarDato()">
                    <button onclick="document.getElementById('file-input').click()" class="btn-upload">
                        <i class="fa fa-plus"></i> INYECTAR FRAGMENTO
                    </button>
                </div>

                <div id="file-list" class="file-grid">
                    </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
